  # 🤖 1. 일반/포괄 재활 (매월 1일 가동)
  bot_01_general:
    <<: *bot-template
    container_name: multibot_01_general
    environment:
      - BOT_NAME=general
      - BOT_KOR_NAME=일반 및 포괄 재활
      - RUN_DAY=1
      - ZOTERO_FOLDER_ID=NP96UXQT
      - TARGET_ISSNS=0003-9993|2234-0645|0894-9115|0269-2155|1934-1482|1650-1977|1973-9087|0963-8288

