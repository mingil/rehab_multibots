version: '3.8'

# 공통 템플릿 - 1세트의 파이썬 코드를 11개의 봇이 공유합니다
x-bot-template: &bot-template
  build: .
  restart: on-failure:5
  env_file:
    - .env
  volumes:
    - /volume1/docker/rehab_multibots:/app

